<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="utf-8">
	<title>Wealthreader Widget</title>
	<style>
		html, body {
			margin: 0;
			padding: 0;
			height: 100%;
			width: 100%;
		}
		#error {
			padding: 2rem;
			color: #a94442;
			font-family: sans-serif;
		}
	</style>
</head>
<body>
	{% if error %}
	<div id="error">{{ error }}</div>
	{% else %}
	<iframe id="wr-iframe" title="Wealth Reader widget" width="100%" height="100%" frameBorder="0" referrerpolicy="origin"></iframe>

	<script>
		window.wr_conf = {
			operation_id: {{ operation_id | tojson }},
			entities_to_display: [],
			wait_full_response: true,
			product_types: {{ product_types | tojson }},
			widget_domain: {{ widget_domain | tojson }},
		};

		{% if date_from %}
		window.wr_conf.date_from = {{ date_from | tojson }};
		{% endif %}

		const parentOrigin = {{ parent_origin | tojson }};
		const widgetOrigin = "https://widget.wealthreader.com";

		window.addEventListener("message", function (e) {
			if (e.origin !== widgetOrigin) {
				return;
			}
			if (
				e.data === "flow completed" ||
				e.data === "flow failed" ||
				e.data === "flow cancelled"
			) {
				window.parent.postMessage(e.data, parentOrigin);
			}
		});
	</script>
	<script src="https://widget.wealthreader.com/js/load.js"></script>
	{% endif %}
</body>
</html>
